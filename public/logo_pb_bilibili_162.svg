<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Shield Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2a8fff" />
      <stop offset="60%" stop-color="#0c3ea1" />
      <stop offset="100%" stop-color="#02143a" />
    </radialGradient>
    
    <!-- Outer Border Glow Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#001845" />
    </linearGradient>

    <!-- Metallic Rims -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#a3daff" />
      <stop offset="70%" stop-color="#1d7aff" />
      <stop offset="100%" stop-color="#003580" />
    </linearGradient>

    <!-- Ribbon/Banner Gradient -->
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0055ff" />
      <stop offset="50%" stop-color="#002b99" />
      <stop offset="100%" stop-color="#001550" />
    </linearGradient>

    <!-- Glowing Blue Stroke -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f6ff" />
      <stop offset="100%" stop-color="#005bfa" />
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Circle Shadow & Glow -->
  <g filter="url(#dropShadow)">
    <!-- Shield Outer Frame -->
    <path d="M 250,20 
             C 340,20 450,80 450,220 
             C 450,340 370,430 250,480 
             C 130,430 50,340 50,220 
             C 50,80 160,20 250,20 Z" 
          fill="url(#borderGrad)" />

    <!-- Inner Shield (Contracted) -->
    <path d="M 250,28 
             C 334,28 438,86 438,220 
             C 438,334 362,418 250,468 
             C 138,418 62,334 62,220 
             C 62,86 166,28 250,28 Z" 
          fill="#000d26" />

    <path d="M 250,32 
             C 330,32 430,88 430,220 
             C 430,330 356,412 250,460 
             C 144,412 70,330 70,220 
             C 70,88 170,32 250,32 Z" 
          fill="url(#bgGrad)" />
  </g>

  <!-- Stars at the top in an arch -->
  <g fill="#ffffff">
    <!-- Center Star -->
    <polygon points="250,55 254,67 266,67 257,74 260,86 250,79 240,86 243,74 234,67 246,67" filter="url(#glow)" />
    <!-- Left Star 1 -->
    <polygon points="212,65 215,75 225,75 217,81 220,91 212,85 204,91 207,81 199,75 209,75" opacity="0.9" />
    <!-- Right Star 1 -->
    <polygon points="288,65 291,75 301,75 293,81 296,91 288,85 280,91 283,81 275,75 285,75" opacity="0.9" />
    <!-- Left Star 2 -->
    <polygon points="178,85 180,93 189,93 182,98 184,107 178,102 172,107 174,98 167,93 176,93" opacity="0.8" />
    <!-- Right Star 2 -->
    <polygon points="322,85 324,93 333,93 326,98 328,107 322,102 316,107 318,98 311,93 320,93" opacity="0.8" />
  </g>

  <!-- Crossed Badminton Rackets Background -->
  <g stroke="url(#metalGrad)" stroke-width="4" fill="none">
    <!-- Racket 1 (Going Top-Right to Bottom-Left) -->
    <!-- Head -->
    <ellipse cx="325" cy="145" rx="42" ry="52" transform="rotate(28, 325, 145)" stroke-width="6" />
    <!-- Strings -->
    <g stroke="#ffffff" stroke-width="1.2" opacity="0.6">
      <line x1="292" y1="112" x2="358" y2="178" />
      <line x1="305" y1="99" x2="345" y2="191" />
      <line x1="279" y1="125" x2="371" y2="165" />
      <line x1="289" y1="152" x2="361" y2="138" />
      <line x1="325" y1="93" x2="325" y2="197" transform="rotate(28, 325, 145)" />
      <line x1="273" y1="145" x2="377" y2="145" transform="rotate(28, 325, 145)" />
    </g>
    <!-- Shaft -->
    <line x1="301" y1="185" x2="185" y2="305" stroke-width="5" />
    <!-- Handle -->
    <rect x="171" y="310" width="16" height="38" rx="2" transform="rotate(45, 179, 329)" fill="#ffffff" stroke="none" />

    <!-- Racket 2 (Going Top-Left to Bottom-Right) -->
    <!-- Head -->
    <ellipse cx="175" cy="145" rx="42" ry="52" transform="rotate(-28, 175, 145)" stroke-width="6" />
    <!-- Strings -->
    <g stroke="#ffffff" stroke-width="1.2" opacity="0.6">
      <line x1="208" y1="112" x2="142" y2="178" />
      <line x1="195" y1="99" x2="155" y2="191" />
      <line x1="221" y1="125" x2="129" y2="165" />
      <line x1="211" y1="152" x2="139" y2="138" />
      <line x1="175" y1="93" x2="175" y2="197" transform="rotate(-28, 175, 145)" />
      <line x1="123" y1="145" x2="227" y2="145" transform="rotate(-28, 175, 145)" />
    </g>
    <!-- Shaft -->
    <line x1="199" y1="185" x2="315" y2="305" stroke-width="5" />
    <!-- Handle -->
    <rect x="313" y="310" width="16" height="38" rx="2" transform="rotate(-45, 321, 329)" fill="#ffffff" stroke="none" />
  </g>

  <!-- Left & Right Decorative Shuttlecocks (Symmetric Feathers) -->
  <g transform="translate(90, 195) rotate(-40) scale(0.65)" fill="#ffffff">
    <path d="M-20,-40 L0,20 L20,-40 Z" fill="#e8f4ff" opacity="0.9" />
    <path d="M-15,-35 Q-20,0 0,30 Q20,0 15,-35 Z" fill="#ffffff" />
    <rect x="-18" y="20" width="36" height="10" rx="3" fill="#00e1ff" />
    <rect x="-15" y="27" width="30" height="15" rx="5" fill="#ffffff" />
  </g>
  <g transform="translate(410, 195) rotate(40) scale(0.65)" fill="#ffffff">
    <path d="M-20,-40 L0,20 L20,-40 Z" fill="#e8f4ff" opacity="0.9" />
    <path d="M-15,-35 Q-20,0 0,30 Q20,0 15,-35 Z" fill="#ffffff" />
    <rect x="-18" y="20" width="36" height="10" rx="3" fill="#00e1ff" />
    <rect x="-15" y="27" width="30" height="15" rx="5" fill="#ffffff" />
  </g>

  <!-- Elegant 3D Ribbon Banner for "PB BILIBILI" -->
  <g filter="url(#dropShadow)">
    <!-- Back-fold left -->
    <path d="M 38,275 L 75,235 L 75,305 Z" fill="#001845" />
    <path d="M 28,290 L 38,275 L 75,305 L 33,315 Z" fill="#0055ff" />
    
    <!-- Back-fold right -->
    <path d="M 462,275 L 425,235 L 425,305 Z" fill="#001845" />
    <path d="M 472,290 L 462,275 L 425,305 L 467,315 Z" fill="#0055ff" />

    <!-- Main Curved Banner -->
    <path d="M 55,235 Q 250,210 445,235 L 430,305 Q 250,285 70,305 Z" fill="url(#ribbonGrad)" stroke="url(#glowGrad)" stroke-width="4.5" />
  </g>

  <!-- Text inside the Ribbon: "PB BILIBILI" -->
  <path id="curvePath" d="M 68,277 Q 250,252 432,277" fill="none" stroke="none" />
  <text font-family="'Plus Jakarta Sans', 'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="3" filter="url(#glow)">
    <textPath href="#curvePath" startOffset="50%" text-anchor="middle">PB BILIBILI</textPath>
  </text>
  
  <!-- Number "162" below the ribbon -->
  <text x="250" y="365" font-family="'Plus Jakarta Sans', 'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="48" fill="#ffffff" text-anchor="middle" letter-spacing="1" filter="url(#dropShadow)">
    162
  </text>

  <!-- Bottom Shuttlecock pointing down (Realistic & Glossy) -->
  <g transform="translate(250, 422) scale(0.85)" filter="url(#dropShadow)">
    <!-- Shuttlecock Feathers -->
    <path d="M-25,-35 C-20,0 -5,25 0,45 C5,25 20,0 25,-35 Z" fill="#ffffff" opacity="0.95" stroke="#00f0ff" stroke-width="1.5" />
    <path d="M-15,-35 L-5,40 L5,40 L15,-35 Z" fill="#f0faff" stroke="#00d8ff" stroke-width="1" />
    <!-- Blue band at top of cork -->
    <path d="M-18,-35 C-18,-20 18,-20 18,-35 Z" fill="#0055ff" />
    <path d="M-14,-32 C-14,-25 14,-25 14,-32 Z" fill="#ffffff" />
  </g>
</svg>
